<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Budget Tracker</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <header class="card">
        <h1>💰 Budget Tracker</h1>
        <p>Track your daily expenses easily and efficiently.</p>
    </header>

    <section class="card">

        <h2>Add Expense</h2>

        <form>

            <label>Expense Name</label>
            <input type="text" placeholder="Enter expense">

            <label>Category</label>
            <input type="text" placeholder="Food, Transport, Rent...">

            <label>Amount (Ksh)</label>
            <input type="number" placeholder="Enter amount">

            <label>Date</label>
            <input type="date">

            <button type="submit">
                Add Expense
            </button>

        </form>

    </section>

    <section class="card">

        <h2>Expense Table</h2>

        <table>

            <thead>

                <tr>
                    <th>Expense</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Date</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>Lunch</td>
                    <td>Food</td>
                    <td>Ksh 500</td>
                    <td>15/07/2026</td>
                </tr>

                <tr>
                    <td>Fuel</td>
                    <td>Transport</td>
                    <td>Ksh 2,000</td>
                    <td>16/07/2026</td>
                </tr>

                <tr>
                    <td>Internet</td>
                    <td>Utilities</td>
                    <td>Ksh 3,500</td>
                    <td>17/07/2026</td>
                </tr>

            </tbody>

        </table>

    </section>

</div>

</body>
</html>
